global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:9090']

  - job_name: user-service
    static_configs:
      - targets: ['user:9091']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
