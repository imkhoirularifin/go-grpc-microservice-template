apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: go-grpc-template
  labels:
    app: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: go-grpc-template/user:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9091
              name: metrics
          envFrom:
            - configMapRef:
                name: user-config
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: go-grpc-template
  labels:
    app: user
spec:
  selector:
    app: user
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: metrics
      port: 9091
      targetPort: metrics
