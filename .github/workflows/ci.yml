name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: bufbuild/buf-setup-action@v1

      - name: Lint protobuf
        run: make proto-lint

      - name: Generate protobuf
        run: make proto

      - name: Go mod tidy
        run: go mod tidy

      - name: Verify generated code
        run: git diff --exit-code

      - name: Test
        run: make test

      - name: Build
        run: make build
