syntax = "proto3";

package common.v1;

option go_package = "github.com/imkhoirularifin/go-grpc-microservice-template/gen/go/common/v1;commonv1";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 page = 1;
  int32 page_size = 2;
  int64 total = 3;
}
